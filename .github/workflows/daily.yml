name: Daily develop → main

# 09:00 / 14:00 / 19:00 em America/Sao_Paulo = 12:00 / 17:00 / 22:00 UTC
on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  discussions: write
  issues: write

concurrency:
  group: daily-project-flow
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DAILY_GITHUB_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B -q package -DskipTests

      - name: Run daily workflow
        env:
          # Preferência: PAT em secrets.DAILY_GITHUB_TOKEN (recomendado para discussions/merge).
          # Fallback: GITHUB_TOKEN do Actions (já tem contents/PRs com as permissions acima).
          GITHUB_TOKEN: ${{ secrets.DAILY_GITHUB_TOKEN || github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GIT_SOURCE_BRANCH: develop
          GIT_TARGET_BRANCH: main
          MIN_LINES: "100"
          AUTHOR_NAME: Livyson
          AUTHOR_EMAIL: livyson@users.noreply.github.com
        run: java -jar target/daily-project-1.0.0.jar --once
