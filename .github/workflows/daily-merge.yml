name: Daily merge open PR

# Mergeia o PR aberto ~30 min depois de cada abertura (09:30 / 14:30 / 19:30 BRT).
# 12:30 / 17:30 / 22:30 UTC
on:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 17 * * *"
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: daily-project-merge
  cancel-in-progress: false

jobs:
  merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DAILY_GITHUB_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B -q package -DskipTests

      - name: Merge open PR
        env:
          GITHUB_TOKEN: ${{ secrets.DAILY_GITHUB_TOKEN || github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GIT_SOURCE_BRANCH: develop
          GIT_TARGET_BRANCH: main
          AUTHOR_NAME: Livyson
          AUTHOR_EMAIL: livyson@users.noreply.github.com
        run: java -jar target/daily-project-1.0.0.jar --merge
